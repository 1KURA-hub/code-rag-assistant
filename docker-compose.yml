services:
  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: "8090"
      POSTGRES_DSN: "host=postgres user=code_rag password=code_rag dbname=code_rag port=5432 sslmode=disable"
      WORK_DIR: "/app/tmp/repos"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      DASHSCOPE_API_KEY: "${DASHSCOPE_API_KEY:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-https://api.openai.com/v1}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4o-mini}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-text-embedding-3-small}"
      EMBEDDING_PROVIDER: "${EMBEDDING_PROVIDER:-remote}"
      EMBEDDING_DIM: "${EMBEDDING_DIM:-128}"
      GITHUB_TIMEOUT_SECONDS: "${GITHUB_TIMEOUT_SECONDS:-180}"
      LLM_TIMEOUT_SECONDS: "${LLM_TIMEOUT_SECONDS:-60}"
      MAX_REPO_MB: "${MAX_REPO_MB:-30}"
    ports:
      - "8090:8090"
    volumes:
      - app-workdir:/app/tmp/repos
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: code_rag
      POSTGRES_PASSWORD: code_rag
      POSTGRES_DB: code_rag
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U code_rag -d code_rag"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  app-workdir:
  postgres-data:
